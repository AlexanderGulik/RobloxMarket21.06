services:
  backend:
    ports:
      - "5000:5000"
    build:
      context: ./roblox_backend
    environment:
      - NODE_ENV=production
    depends_on:
      - mysql
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  mysql:
    build:
      context: ./mysql
    env_file:
      - ./roblox_backend/.env
    volumes:
      - mysql-data:/var/lib/mysql
      - ./roblox_backend/RobloxMarket_DataBase.sql:/docker-entrypoint-initdb.d/RobloxMarket_DataBase.sql
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 5G
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/nginx/certs
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    restart: always

volumes:
  mysql-data:
  redis-data: